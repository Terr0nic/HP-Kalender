<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Theorie-Unterricht – Kalender</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e5e7eb;
      --shadow:0 12px 34px rgba(2,6,23,.08);
      --radius:18px;
      --accent:#2563eb;

      --holidayBg:#f1f5f9;
      --holidayBorder:#cbd5e1;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      font-size:15px;
      line-height:1.4;
    }

    .wrap{
      max-width:1280px;
      margin:24px auto;
      padding:0 16px;
    }

    h1{
      margin:0 0 12px;
      font-size:24px;
      font-weight:950;
      letter-spacing:-0.2px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      left:0; top:0; right:0;
      height:6px;
      background:var(--accent);
    }

    button{
      border:1px solid var(--border);
      background:#fff;
      color:#111827;
      font-weight:900;
      border-radius:14px;
      padding:9px 12px;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    button:hover{
      box-shadow:0 8px 18px rgba(15,23,42,.06);
      border-color:rgba(37,99,235,.25);
    }

    .topRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:12px;
    }

    .branchBar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }

    .bbtn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:8px 12px;
      border:1px solid var(--border);
      background:#fff;
      font-weight:950;
      font-size:14px;
    }

    .bbtn.active{
      background:#111827;
      color:#fff;
      border-color:#111827;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
    }

    .navRow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .navPill{
      display:flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--border);
      border-radius:999px;
      padding:6px 8px;
      background:#fff;
    }

    .iconBtn{
      width:38px;
      height:38px;
      padding:0;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      line-height:1;
    }

    .monthTitle{
      min-width:170px;
      text-align:center;
      font-weight:950;
      font-size:15px;
    }

    .todayBtn{
      background:var(--accent);
      color:#fff;
      border-color:transparent;
      border-radius:999px;
    }

    .nextBar{
      border:1px solid var(--border);
      border-radius:16px;
      padding:10px 12px;
      margin-bottom:14px;
      background:linear-gradient(180deg,#fff 0%, #fbfcff 100%);
      position:relative;
      overflow:hidden;
    }

    .nextBar::before{
      content:"";
      position:absolute;
      left:0; top:0; bottom:0;
      width:6px;
      background:var(--accent);
    }

    .nextLabel{
      font-size:12px;
      font-weight:950;
      color:#334155;
    }

    .nextMain{
      font-size:14px;
      font-weight:950;
      margin-top:4px;
    }

    .nextSub{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }

    .sectionTitle{
      margin:8px 0 10px;
      font-size:15px;
      font-weight:950;
      color:#0f172a;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .sectionTitle .hint{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
    }

    table.cal{
      width:100%;
      border-collapse:separate;
      border-spacing:7px;
    }

    .cal th{
      text-align:left;
      font-size:12px;
      color:#475569;
      padding:0 6px;
      font-weight:950;
    }

    .day{
      border:1px solid var(--border);
      border-radius:15px;
      padding:9px;
      min-height:96px;
      vertical-align:top;
      background:#fff;
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    .day:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(16,24,40,.08);
      border-color:rgba(37,99,235,.20);
    }

    .day.out{
      opacity:.30;
      background:transparent;
      border-color:transparent;
      box-shadow:none;
    }

    .day.out:hover{
      transform:none;
      box-shadow:none;
    }

    .day.past{
      opacity:.48;
    }

    .day.today{
      outline:2px solid rgba(37,99,235,.22);
      outline-offset:2px;
    }

    .dateLine{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:7px;
      font-size:12px;
      font-weight:950;
      color:#334155;
    }

    .wk{color:#64748b}

    .pill{
      border:1px solid rgba(0,0,0,.06);
      border-radius:13px;
      padding:7px 8px;
      background:#f9fafb;
      margin-top:6px;
      cursor:pointer;
      position:relative;
      overflow:hidden;
    }

    .pill::before{
      content:"";
      position:absolute;
      left:0; top:0; bottom:0;
      width:5px;
      background:rgba(37,99,235,.6);
    }

    .pillTitle{
      font-size:12px;
      font-weight:950;
      line-height:1.15;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .pillText{
      font-size:11px;
      color:#334155;
      margin-top:3px;
      line-height:1.25;
    }

    .pill.hafen{
      background:rgba(245,158,11,.12);
      border-color:rgba(245,158,11,.22);
    }

    .pill.hafen::before{background:rgba(245,158,11,.72)}

    .pill.off{
      background:rgba(239,68,68,.10);
      border-color:rgba(239,68,68,.22);
    }

    .pill.off::before{background:rgba(239,68,68,.72)}

    .pill.holiday{
      background:var(--holidayBg);
      border-color:var(--holidayBorder);
      font-style:italic;
      color:#475569;
    }

    .pill.holiday::before{background:#94a3b8}

    .list{
      margin-top:18px;
      padding-top:14px;
      border-top:1px solid var(--border);
    }

    .item{
      border:1px solid var(--border);
      border-radius:15px;
      padding:11px 12px;
      background:#fff;
      cursor:pointer;
    }

    .item + .item{margin-top:10px}

    .when{
      font-weight:950;
      font-size:14px;
    }

    .small{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
      line-height:1.35;
    }

    .row2{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:6px;
    }

    .badgeTiny{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--border);
      border-radius:999px;
      padding:4px 8px;
      background:#fafbff;
      font-size:11px;
      font-weight:950;
    }

    .modalOverlay{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }

    .modal{
      width:min(560px,100%);
      background:#fff;
      border:1px solid rgba(0,0,0,.08);
      border-radius:20px;
      box-shadow:0 30px 80px rgba(0,0,0,.25);
      overflow:hidden;
    }

    .modalHeader{
      padding:14px 14px 10px;
      border-bottom:1px solid var(--border);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .modalHeader .title{
      font-weight:950;
    }

    .modalHeader .meta{
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
      line-height:1.35;
    }

    .modalClose{
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      padding:8px 10px;
      font-weight:950;
    }

    .modalBody{padding:14px}

    .modalBadge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fafbff;
      font-size:12px;
      font-weight:950;
    }

    .modalBody p{
      margin:10px 0 0;
      line-height:1.45;
    }

    @media (max-width: 820px){
      .topRow{align-items:flex-start}
      .branchBar{width:100%}
      .navRow{width:100%;justify-content:space-between}
      .monthTitle{min-width:140px}
      table.cal{border-spacing:6px}
      .day{min-height:88px;padding:8px}
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🚦 Theorie-Unterricht</h1>

  <div class="card" id="mainCard">
    <div class="topRow">
      <div class="branchBar" id="branchBar"></div>

      <div class="navRow">
        <div class="navPill">
          <button class="iconBtn" id="prevMonth" type="button">‹</button>
          <div class="monthTitle" id="monthTitle">—</div>
          <button class="iconBtn" id="nextMonth" type="button">›</button>
        </div>
        <button class="todayBtn" id="goToday" type="button">Heute</button>
      </div>
    </div>

    <div class="nextBar">
      <div class="nextLabel">⏭️ Nächster Unterricht</div>
      <div class="nextMain" id="nextMain">—</div>
      <div class="nextSub" id="nextSub">—</div>
    </div>

    <div class="sectionTitle">
      <span>Kalender</span>
      <span class="hint">Vergangene Wochen werden automatisch ausgeblendet</span>
    </div>

    <div id="calendarWrap">
      <table class="cal">
        <thead>
          <tr><th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th><th>Sa</th><th>So</th></tr>
        </thead>
        <tbody id="calBody"></tbody>
      </table>
    </div>

    <div class="list" id="listWrap"></div>
  </div>
</div>

<div class="modalOverlay" id="modalOverlay">
  <div class="modal">
    <div class="modalHeader">
      <div>
        <div class="title" id="mTitle">—</div>
        <div class="meta" id="mMeta">—</div>
      </div>
      <button class="modalClose" id="mClose" type="button">Schließen</button>
    </div>
    <div class="modalBody">
      <span class="modalBadge" id="mBadge">—</span>
      <p id="mBody">—</p>
    </div>
  </div>
</div>

<script>
(() => {
  const CONFIG = {
    anchors: {
      innenstadt: { date: "2026-04-13", lessonNo: 9 },
      hemshof:    { date: "2026-04-14", lessonNo: 7 },
      seckenheim: { date: "2026-04-14", lessonNo: 5 }
    },
    closures: {
      hemshof: ["2026-02-03"],
      innenstadt: [],
      seckenheim: [],
      hafen: []
    }
  };

  const TOPICS = [
    "Persönliche Voraussetzungen / Risikofaktor Mensch",
    "Rechtliche Rahmenbedingungen",
    "Grundregeln, Verkehrszeichen und Verkehrseinrichtungen",
    "Straßenverkehrssystem und seine Nutzung, Bahnübergänge",
    "Vorfahrt / Vorrang",
    "Verkehrsregelungen",
    "Geschwindigkeit, Abstand und umweltschonende Fahrweise",
    "Andere Teilnehmer im Straßenverkehr",
    "Verkehrsverhalten bei Fahrmanövern, Verkehrsbeobachtung",
    "Ruhender Verkehr, Absichern, Abschleppen",
    "Besondere Situationen, Verstöße gegen Vorschriften",
    "Lebenslanges Lernen",
    "Technische Bedingungen, Personen- und Güterbeförderung",
    "Fahren mit Solokraftfahrzeugen und Zügen, umweltschonender Umgang"
  ];

  const TOPIC_EMOJIS = ["🧠","⚖️","🚦","🛤️","➡️","📋","⏱️","🚶‍♂️","👀","🅿️","⚠️","📚","🔧","🌱"];

  const BRANCHES = [
    { id:"innenstadt", name:"Mannheim Innenstadt", type:"PKW", state:"BW",  isoDays:[1,3], timeText:"18:00–19:30", accent:"#2563eb" },
    { id:"seckenheim", name:"Mannheim Seckenheim", type:"PKW", state:"BW",  isoDays:[2,4], timeText:"18:00–19:30", accent:"#16a34a" },
    { id:"hemshof",    name:"Ludwigshafen Hemshof", type:"PKW", state:"RLP", isoDays:[2,4], timeText:"18:00–19:30", accent:"#0891b2" },
    { id:"hafen",      name:"Mannheim Hafen", type:"HAFEN", state:"BW", isoDays:[3], timeText:"17:00–20:00", accent:"#f59e0b" }
  ];

  const $ = (id)=>document.getElementById(id);
  const elBranchBar = $("branchBar");
  const elMonthTitle = $("monthTitle");
  const elCalBody = $("calBody");
  const elListWrap = $("listWrap");
  const elNextMain = $("nextMain");
  const elNextSub  = $("nextSub");

  const modalOverlay = $("modalOverlay");
  const mTitle = $("mTitle");
  const mMeta = $("mMeta");
  const mBadge = $("mBadge");
  const mBody = $("mBody");

  let currentBranchId = "innenstadt";
  let currentMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);

  const pad2 = (n)=>String(n).padStart(2,"0");
  const toISODate = (d)=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  const startOfDay = (d)=>new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const addDays = (d,n)=>new Date(d.getFullYear(), d.getMonth(), d.getDate()+n);
  const jsToIso = (jsDay)=>(jsDay===0?7:jsDay);

  const fmtDE = (d)=>new Intl.DateTimeFormat("de-DE",{weekday:"short",day:"2-digit",month:"2-digit",year:"numeric"}).format(d);
  const fmtWk = (d)=>new Intl.DateTimeFormat("de-DE",{weekday:"short"}).format(d).replace(".","");
  const fmtDM = (d)=>new Intl.DateTimeFormat("de-DE",{day:"2-digit",month:"2-digit"}).format(d);

  function escapeHtml(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function getBranch(){
    return BRANCHES.find(b=>b.id===currentBranchId) || BRANCHES[0];
  }

  function applyAccent(){
    document.documentElement.style.setProperty("--accent", getBranch().accent || "#2563eb");
  }

  function topicColor(lessonNo){
    const hue = Math.round((lessonNo - 1) * (360 / 14));
    return {
      bg: `hsla(${hue}, 85%, 95%, 1)`,
      border: `hsla(${hue}, 65%, 75%, 1)`,
      bar: `hsla(${hue}, 65%, 60%, 1)`
    };
  }

  function parseClosureSet(arr){
    const set = new Set();
    const lines = Array.isArray(arr) ? arr : [];
    for(const raw of lines){
      const l = String(raw).trim();
      if(!l) continue;

      if(l.includes("..")){
        const [a,b] = l.split("..").map(x=>x.trim());
        if(!/^\d{4}-\d{2}-\d{2}$/.test(a) || !/^\d{4}-\d{2}-\d{2}$/.test(b)) continue;
        let d1 = startOfDay(new Date(a+"T00:00:00"));
        let d2 = startOfDay(new Date(b+"T00:00:00"));
        if(d1>d2) [d1,d2]=[d2,d1];
        while(d1<=d2){ set.add(toISODate(d1)); d1=addDays(d1,1); }
      } else {
        if(!/^\d{4}-\d{2}-\d{2}$/.test(l)) continue;
        set.add(l);
      }
    }
    return set;
  }

  function easterSunday(year){
    const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4;
    const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3);
    const h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4;
    const l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
    const month=Math.floor((h+l-7*m+114)/31);
    const day=((h+l-7*m+114)%31)+1;
    return new Date(year,month-1,day);
  }

  function buildHolidayMap(year, state){
    const map = new Map();
    const addHoliday = (date,name)=>map.set(toISODate(date),name);

    addHoliday(new Date(year,0,1), "Neujahr");
    addHoliday(new Date(year,4,1), "Tag der Arbeit");
    addHoliday(new Date(year,9,3), "Tag der Deutschen Einheit");
    addHoliday(new Date(year,11,25), "1. Weihnachtstag");
    addHoliday(new Date(year,11,26), "2. Weihnachtstag");

    const easter = easterSunday(year);
    addHoliday(addDays(easter,-2), "Karfreitag");
    addHoliday(addDays(easter,1),  "Ostermontag");
    addHoliday(addDays(easter,39), "Christi Himmelfahrt");
    addHoliday(addDays(easter,50), "Pfingstmontag");

    if(state==="BW"){
      addHoliday(new Date(year,0,6), "Heilige Drei Könige");
      addHoliday(new Date(year,10,1), "Allerheiligen");
      addHoliday(addDays(easter,60), "Fronleichnam");
    }
    if(state==="RLP"){
      addHoliday(new Date(year,10,1), "Allerheiligen");
      addHoliday(addDays(easter,60), "Fronleichnam");
    }

    return map;
  }

  function previousLessonDay(fromDate, isoDays){
    let d = startOfDay(fromDate);
    for(let i=0;i<10;i++){
      d = addDays(d,-1);
      if(isoDays.includes(jsToIso(d.getDay()))) return d;
    }
    return addDays(fromDate,-1);
  }

  function nextLessonDay(fromDate, isoDays){
    let d = startOfDay(fromDate);
    for(let i=0;i<10;i++){
      d = addDays(d,1);
      if(isoDays.includes(jsToIso(d.getDay()))) return d;
    }
    return addDays(fromDate,1);
  }

  function buildSchedule(branch, yearNow, closureSet){
    const startWindow = new Date(`${yearNow-1}-01-01T00:00:00`);
    const endWindow   = new Date(`${yearNow+1}-12-31T00:00:00`);

    const holidayMap = new Map([
      ...buildHolidayMap(yearNow-1, branch.state),
      ...buildHolidayMap(yearNow,   branch.state),
      ...buildHolidayMap(yearNow+1, branch.state)
    ]);

    const notes = new Map();
    for(const [dISO,name] of holidayMap.entries()){
      if(!notes.has(dISO)) notes.set(dISO, []);
      notes.get(dISO).push({kind:"HOLIDAY", text:name});
    }

    if(branch.type==="HAFEN"){
      const events = [];
      let d = startOfDay(startWindow);

      while(d <= endWindow){
        const dISO = toISODate(d);
        if(branch.isoDays.includes(jsToIso(d.getDay()))){
          const isHoliday = holidayMap.has(dISO);
          const isClosure = closureSet.has(dISO);

          if(isHoliday || isClosure){
            if(!notes.has(dISO)) notes.set(dISO, []);
            notes.get(dISO).push({
              kind:"OFF",
              text:[
                isHoliday ? `Feiertag: ${holidayMap.get(dISO)}` : "",
                isClosure ? "Urlaub / Ausfall" : ""
              ].filter(Boolean).join(" + ") || "Kein Unterricht"
            });
          } else {
            events.push({
              dateISO:dISO,
              kind:"HAFEN",
              title:"LKW/BUS-Theorie",
              timeText:branch.timeText
            });
          }
        }
        d = addDays(d,1);
      }

      return {events, notes};
    }

    const anchor = CONFIG.anchors[branch.id];
    if(!anchor || !anchor.date || !anchor.lessonNo){
      return {events:[], notes};
    }

    const anchorDate = startOfDay(new Date(anchor.date+"T00:00:00"));
    const anchorLessonNo = Math.min(14, Math.max(1, Number(anchor.lessonNo)));

    const lessonMap = new Map();
    lessonMap.set(toISODate(anchorDate), anchorLessonNo);

    // rückwärts
    let dBack = startOfDay(anchorDate);
    let lessonBack = anchorLessonNo;

    while(dBack > startWindow){
      const prev = previousLessonDay(dBack, branch.isoDays);
      const prevISO = toISODate(prev);

      const isHoliday = holidayMap.has(prevISO);
      const isClosure = closureSet.has(prevISO);

      if(isHoliday || isClosure){
        if(!notes.has(prevISO)) notes.set(prevISO, []);
        notes.get(prevISO).push({
          kind:"OFF",
          text:[
            isHoliday ? `Feiertag: ${holidayMap.get(prevISO)}` : "",
            isClosure ? "Urlaub / Ausfall" : ""
          ].filter(Boolean).join(" + ") || "Kein Unterricht"
        });
      } else {
        lessonBack--;
        if(lessonBack < 1) lessonBack = 14;
        lessonMap.set(prevISO, lessonBack);
      }

      dBack = prev;
    }

    // vorwärts
    let dFwd = startOfDay(anchorDate);
    let lessonFwd = anchorLessonNo;

    while(dFwd < endWindow){
      const next = nextLessonDay(dFwd, branch.isoDays);
      const nextISO = toISODate(next);

      const isHoliday = holidayMap.has(nextISO);
      const isClosure = closureSet.has(nextISO);

      if(isHoliday || isClosure){
        if(!notes.has(nextISO)) notes.set(nextISO, []);
        notes.get(nextISO).push({
          kind:"OFF",
          text:[
            isHoliday ? `Feiertag: ${holidayMap.get(nextISO)}` : "",
            isClosure ? "Urlaub / Ausfall" : ""
          ].filter(Boolean).join(" + ") || "Kein Unterricht"
        });
      } else {
        lessonFwd++;
        if(lessonFwd > 14) lessonFwd = 1;
        lessonMap.set(nextISO, lessonFwd);
      }

      dFwd = next;
    }

    const events = [];
    for(const [dateISO, lessonNo] of lessonMap.entries()){
      const dt = new Date(dateISO+"T00:00:00");
      if(dt >= startWindow && dt <= endWindow){
        events.push({
          dateISO,
          kind:"PKW",
          lessonNo,
          topicText: TOPICS[lessonNo-1],
          timeText: branch.timeText
        });
      }
    }

    events.sort((a,b)=>a.dateISO.localeCompare(b.dateISO));
    return {events, notes};
  }

  function buildBranchButtons(){
    elBranchBar.innerHTML = "";
    for(const b of BRANCHES){
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "bbtn";
      btn.dataset.id = b.id;
      btn.innerHTML = `<span class="dot" style="background:${b.accent}"></span>${escapeHtml(b.name)}`;
      btn.addEventListener("click", ()=>{
        currentBranchId = b.id;
        applyAccent();
        highlightBranchButtons();
        renderAll();
      });
      elBranchBar.appendChild(btn);
    }
  }

  function highlightBranchButtons(){
    [...elBranchBar.querySelectorAll(".bbtn")].forEach(btn=>{
      btn.classList.toggle("active", btn.dataset.id === currentBranchId);
    });
  }

  function openModal({title, meta, badge, body}){
    mTitle.textContent = title || "";
    mMeta.textContent = meta || "";
    mBadge.textContent = badge || "";
    mBody.textContent = body || "";
    modalOverlay.style.display = "flex";
  }

  function closeModal(){
    modalOverlay.style.display = "none";
  }

  function computeNextLesson(events){
    const todayISO = toISODate(new Date());
    return events.find(e => e.dateISO >= todayISO) || null;
  }

  function renderNext(branch, events){
    const next = computeNextLesson(events);

    if(!next){
      elNextMain.textContent = "—";
      elNextSub.textContent = "Keine Termine im Zeitraum.";
      return;
    }

    const d = new Date(next.dateISO+"T00:00:00");
    const wk = fmtWk(d);
    const dm = fmtDM(d);

    if(next.kind === "HAFEN"){
      elNextMain.textContent = `${wk}, ${dm} • 🚛 LKW/BUS`;
      elNextSub.textContent = `${branch.name} • ${branch.timeText}`;
    } else {
      const emoji = TOPIC_EMOJIS[next.lessonNo-1] || "🚗";
      elNextMain.textContent = `${wk}, ${dm} • THEMA ${next.lessonNo} ${emoji}`;
      elNextSub.textContent = `${next.topicText} • ${branch.timeText}`;
    }
  }

  function shouldHideWeekRow(weekDaysISO, todayISO){
    return weekDaysISO.every(dISO => dISO < todayISO);
  }

  function renderCalendar(branch, events, notesMap){
    const y = currentMonth.getFullYear();
    const m = currentMonth.getMonth();
    const firstOfMonth = new Date(y,m,1);
    elMonthTitle.textContent = new Intl.DateTimeFormat("de-DE",{month:"long",year:"numeric"}).format(firstOfMonth);

    const eventMap = new Map();
    for(const e of events){
      if(!eventMap.has(e.dateISO)) eventMap.set(e.dateISO, []);
      eventMap.get(e.dateISO).push(e);
    }

    const firstIso = jsToIso(firstOfMonth.getDay());
    const gridStart = addDays(firstOfMonth, -(firstIso-1));

    elCalBody.innerHTML = "";
    let d = startOfDay(gridStart);
    const todayISO = toISODate(new Date());

    for(let week=0; week<6; week++){
      const weekDates = [];
      let tmp = startOfDay(d);
      for(let i=0;i<7;i++){
        weekDates.push(toISODate(tmp));
        tmp = addDays(tmp,1);
      }

      const weekHasMonth = weekDates.some(dISO => {
        const dt = new Date(dISO+"T00:00:00");
        return dt.getFullYear()===y && dt.getMonth()===m;
      });

      if(!weekHasMonth){
        d = addDays(d,7);
        continue;
      }

      const allPast = shouldHideWeekRow(weekDates, todayISO);
      if(allPast){
        d = addDays(d,7);
        continue;
      }

      const tr = document.createElement("tr");

      for(let i=0; i<7; i++){
        const td = document.createElement("td");
        const dISO = toISODate(d);
        const inMonth = d.getMonth()===m && d.getFullYear()===y;

        td.className = "day" + (inMonth ? "" : " out");
        if(dISO < todayISO) td.classList.add("past");
        if(dISO === todayISO) td.classList.add("today");

        td.innerHTML = `
          <div class="dateLine">
            <span class="wk">${fmtWk(d)}</span>
            <span class="dt">${fmtDM(d)}</span>
          </div>
        `;

        const showContent = inMonth || (eventMap.get(dISO)||[]).length || (notesMap.get(dISO)||[]).length;

        if(showContent){
          const notes = notesMap.get(dISO) || [];
          for(const n of notes){
            const div = document.createElement("div");
            div.className = "pill " + (n.kind==="OFF" ? "off" : "holiday");
            const title = n.kind==="OFF" ? "Kein Unterricht" : "Feiertag";

            div.innerHTML = `
              <div class="pillTitle">${escapeHtml(title)}</div>
              <div class="pillText">${escapeHtml(n.text)}</div>
            `;

            div.addEventListener("click", ()=>{
              openModal({
                title,
                meta:`${branch.name} • ${fmtDE(new Date(dISO+"T00:00:00"))}`,
                badge:n.kind==="OFF" ? "OFF" : "Feiertag",
                body:n.text
              });
            });

            td.appendChild(div);
          }

          const evs = eventMap.get(dISO) || [];
          for(const e of evs){
            const div = document.createElement("div");

            if(e.kind === "HAFEN"){
              div.className = "pill hafen";
              div.innerHTML = `
                <div class="pillTitle">🚛 LKW/BUS</div>
                <div class="pillText">${escapeHtml(e.timeText)}</div>
              `;

              div.addEventListener("click", ()=>{
                openModal({
                  title:"🚛 LKW/BUS – Theorie",
                  meta:`${branch.name} • ${fmtDE(new Date(e.dateISO+"T00:00:00"))} • ${e.timeText}`,
                  badge:"Hafen",
                  body:"Spezialunterricht im Hafen (LKW/BUS)."
                });
              });
            } else {
              const emoji = TOPIC_EMOJIS[e.lessonNo-1] || "🚗";
              const c = topicColor(e.lessonNo);

              div.className = "pill";
              div.style.background = c.bg;
              div.style.borderColor = c.border;
              div.style.boxShadow = `inset 5px 0 0 0 ${c.bar}`;

              div.innerHTML = `
                <div class="pillTitle">THEMA ${e.lessonNo} ${emoji}</div>
                <div class="pillText">${escapeHtml(e.topicText)}</div>
              `;

              div.addEventListener("click", ()=>{
                openModal({
                  title:`THEMA ${e.lessonNo} ${emoji}`,
                  meta:`${branch.name} • ${fmtDE(new Date(e.dateISO+"T00:00:00"))} • ${e.timeText}`,
                  badge:"🚗 PKW Theorie",
                  body:e.topicText
                });
              });
            }

            td.appendChild(div);
          }
        }

        tr.appendChild(td);
        d = addDays(d,1);
      }

      elCalBody.appendChild(tr);
    }
  }

  function renderList(branch, events){
    const todayISO = toISODate(new Date());
    const upcoming = events.filter(e => e.dateISO >= todayISO).slice(0,10);

    elListWrap.innerHTML = `
      <div class="listHead">
        <h3>Nächste Termine</h3>
        <div class="hint">${escapeHtml(branch.name)}</div>
      </div>
    `;

    if(!upcoming.length){
      elListWrap.innerHTML += `<div class="small">Keine kommenden Termine gefunden.</div>`;
      return;
    }

    for(const e of upcoming){
      const item = document.createElement("div");
      item.className = "item";
      const d = new Date(e.dateISO+"T00:00:00");

      if(e.kind === "HAFEN"){
        item.innerHTML = `
          <div class="when">${fmtDE(d)} • ${escapeHtml(e.timeText)}</div>
          <div class="row2">
            <span class="badgeTiny">🚛 Hafen</span>
          </div>
          <div class="small">LKW/BUS-Theorie</div>
        `;
      } else {
        const emoji = TOPIC_EMOJIS[e.lessonNo-1] || "🚗";
        item.innerHTML = `
          <div class="when">${fmtDE(d)} • ${escapeHtml(e.timeText)}</div>
          <div class="row2">
            <span class="badgeTiny">🚗 PKW</span>
            <span class="badgeTiny">THEMA ${e.lessonNo} ${emoji}</span>
          </div>
          <div class="small">${escapeHtml(e.topicText)}</div>
        `;
      }

      item.addEventListener("click", ()=>{
        if(e.kind === "HAFEN"){
          openModal({
            title:"🚛 LKW/BUS – Theorie",
            meta:`${branch.name} • ${fmtDE(d)} • ${e.timeText}`,
            badge:"Hafen",
            body:"Spezialunterricht im Hafen (LKW/BUS)."
          });
        } else {
          const emoji = TOPIC_EMOJIS[e.lessonNo-1] || "🚗";
          openModal({
            title:`THEMA ${e.lessonNo} ${emoji}`,
            meta:`${branch.name} • ${fmtDE(d)} • ${e.timeText}`,
            badge:"🚗 PKW Theorie",
            body:e.topicText
          });
        }
      });

      elListWrap.appendChild(item);
    }
  }

  function renderAll(){
    applyAccent();

    const branch = getBranch();
    const yearNow = new Date().getFullYear();
    const closureSet = parseClosureSet(CONFIG.closures[branch.id] || []);
    const {events, notes} = buildSchedule(branch, yearNow, closureSet);

    renderNext(branch, events);
    renderCalendar(branch, events, notes);
    renderList(branch, events);
    highlightBranchButtons();
  }

  function init(){
    buildBranchButtons();
    applyAccent();
    highlightBranchButtons();

    $("prevMonth").addEventListener("click", ()=>{
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()-1, 1);
      renderAll();
    });

    $("nextMonth").addEventListener("click", ()=>{
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 1);
      renderAll();
    });

    $("goToday").addEventListener("click", ()=>{
      const n = new Date();
      currentMonth = new Date(n.getFullYear(), n.getMonth(), 1);
      renderAll();
      $("mainCard").scrollIntoView({behavior:"smooth", block:"start"});
    });

    $("mClose").addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{ if(e.target===modalOverlay) closeModal(); });
    document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeModal(); });

    renderAll();
  }

  init();
})();
</script>
</body>
</html>
